services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    
    container_name: effective-mobile-backend
    
    expose:
      - "8080"
    
    networks:
      - app-network
    
    env_file:
      - .env
    
    environment:
      - PYTHONUNBUFFERED=1
      - APP_PORT=${BACKEND_PORT:-8080}
    
    restart: unless-stopped

    # Используем 127.0.0.1 чтобы гарантировать IPv4 и избежать возможных проблем с IPv6 (::1)
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:${BACKEND_PORT:-8080}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    build:
      context: ./nginx          
      dockerfile: Dockerfile
    
    container_name: effective-mobile-nginx
    
    ports:
      - "${NGINX_HOST_PORT:-80}:80"
    
    
    networks:
      - app-network
    
    depends_on:
      backend:
        condition: service_healthy
    
    env_file:
      - .env
    
    environment:
      - BACKEND_SERVICE=backend
    
    restart: unless-stopped
    
    # Используем 127.0.0.1 чтобы гарантировать IPv4 и избежать возможных проблем с IPv6 (::1)
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app-network:
    driver: bridge
    name: ${NETWORK_NAME:-eldabaof-network}